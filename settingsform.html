<!-- This is the settings page for DoodleDesk!
 when users click on the settings button, 
 they will be taken to this page where they can change their username and password,
 enable dark mode, change notes color, and more! 
 -->

<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Settings - Doodle Desk</title>

        <style>
            h1 {
                text-align: center;
                font-family: Georgia, serif;
            }  
            body {
                background: linear-gradient(rgba(255,255,255,0.1), rgba(0, 0, 0, 0.5)), url('images/desk.jpg') center/cover fixed;
                min-height: 100vh;
            }      
        </style>
    </head>

    <form>
        <body>
            <h1>Settings</h1>

            <div class="settings-container">
                <label for="email">Change Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter new email"><br><br>
                
                <label for="username">Change Username:</label><br>
                <input type="text" id="username" name="username" placeholder="Enter new username"><br><br>

                <label for="password">Change Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter new password">
                <button type="button" id="togglePasswordButton">Show</button>

                <script>
                    const passwordInput = document.getElementById('password');
                    const togglePasswordButton = document.getElementById('togglePasswordButton');

                    togglePasswordButton.addEventListener('click', () => {
                        if (passwordInput.type === 'password') {
                            passwordInput.type = 'text';
                            togglePasswordButton.textContent = 'Hide';
                        } else {
                            passwordInput.type = 'password';
                            togglePasswordButton.textContent = 'Show';
                        }
                    });
                </script>

                <label for="darkmode">Enable Dark Mode?:</label>
                <input type="checkbox" id="darkmode" name="darkmode">

                <label for="fontcolor">Change Font Color:</label>
                <input type="color" id="fontcolor" name="fontcolor">

                <label for="notecolor">Change Notes Color:</label>
                <input type="color" id="notecolor" name="notecolor">
                

                <button type="button" id="saveChangesButton">Save Changes</button>
                <button type="submit" id="confirmButton" style="display: none;">Confirm?</button>

                <script>
                    const saveChangesButton = document.getElementById('saveChangesButton');
                    const confirmButton = document.getElementById('confirmButton');

                    saveChangesButton.addEventListener('click', () => {
                        saveChangesButton.style.display = 'none';
                        confirmButton.style.display = 'inline-block';
                    });

                    confirmButton.addEventListener('click', () => {
                        alert('Changes saved successfully!');
                    });
                </script>
            </div>

            <a href="homepage.html" class="button">Back to Home</a>

        </body>
    </form>
</html>
