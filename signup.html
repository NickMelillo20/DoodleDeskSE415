<!--this is the signup page for the website. 
It contains a form for users to create an account. 
The form includes fields for username, email, and password. 
There is also a submit button to create the account. Source, W3Schools-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
<style>
      body {
            background:url('images/doodlebg.jpeg') center/cover fixed;
            min-height: 100vh;
      } 
      
      form {
            background-color: rgb(255, 255, 255);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            margin: auto;
            margin-top: 50px;
      }

      label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
      }

      input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
      }

      button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
      }

      button:hover {
            background-color: #45a049;
      }
 </style>

</head>
<body>
    <form action="homepage.html" method="post">
        <h2>Sign Up Here!</h2>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <button type="button" id="togglePasswordButton">Show</button>

                <script>
                    const passwordInput = document.getElementById('password');
                    const togglePasswordButton = document.getElementById('togglePasswordButton');

                    togglePasswordButton.addEventListener('click', () => {
                        if (passwordInput.type === 'password') {
                            passwordInput.type = 'text';
                            togglePasswordButton.textContent = 'Hide';
                        } else {
                            passwordInput.type = 'password';
                            togglePasswordButton.textContent = 'Show';
                        }
                    });
                </script>
        <br>
      <label for="confirm-password">Confirm Password:</label>
      <input type="password" id="confirm-password" name="confirm-password" required>
      <br>
      <button type="submit" id="submitButton">Submit</button>

      <script>
          const confirmPasswordInput = document.getElementById('confirm-password');
          const submitButton = document.getElementById('submitButton');

          submitButton.addEventListener('click', (event) => {
            if (passwordInput.value !== confirmPasswordInput.value) {
                event.preventDefault();
                alert('Passwords do not match. Please try again.');
            }
          });
      </script>
    </form>
</body>
</html>
