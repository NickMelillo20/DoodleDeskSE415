<!-- Login Page for DoodleDesk
 With this page, users will be able to create accounts
 that will be stored in a database. From there, the user will
 be asked to provide their credentials to sign in to their 
 notes board-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <div class="login"> <!-- Handler for Username and Password -->
        <form method="post" action="" class="">
            <label for="username">Username</label>
            <input type="username" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Log In</button>
        </form>

    </div>
</body>
</html>
